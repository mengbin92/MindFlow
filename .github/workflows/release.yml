name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Flutter releases ──────────────────────────────────────────────

  release-android:
    name: Release Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: cd packages/mobile && flutter pub get

      - name: Build APK
        run: cd packages/mobile && flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: packages/mobile/build/app/outputs/flutter-apk/*.apk

  release-web:
    name: Release Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: cd packages/mobile && flutter pub get

      - name: Build web
        run: cd packages/mobile && flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/mobile/build/web/

  release-macos:
    name: Release macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: cd packages/mobile && flutter pub get

      - name: Build macOS
        run: cd packages/mobile && flutter build macos --release

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: packages/mobile/build/macos/Build/Products/Release/*.app

  # ── Create GitHub Release ──────────────────────────────────────────

  create-release:
    name: Create GitHub Release
    needs: [release-android, release-web, release-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "## MindFlow v$VERSION" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Downloads" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "| Platform | Format |" >> RELEASE_NOTES.md
          echo "|----------|--------|" >> RELEASE_NOTES.md
          echo "| Android | .apk |" >> RELEASE_NOTES.md
          echo "| macOS | .app |" >> RELEASE_NOTES.md
          echo "| Web | Static site |" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Changelog" >> RELEASE_NOTES.md
          echo "See [CHANGELOG](../../blob/main/CHANGELOG.md)" >> RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: MindFlow v${{ steps.release_notes.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: ./artifacts/**
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy Web ─────────────────────────────────────────────────────

  deploy-web:
    name: Deploy to GitHub Pages
    needs: release-web
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
