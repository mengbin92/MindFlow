name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-desktop:
    name: Release Desktop (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            arch: universal
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Add Rust target (macOS)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install dependencies
        run: npm install

      - name: Build desktop app
        run: cd packages/desktop && npm run tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Collect macOS artifacts
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p ./artifacts
          cp packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg ./artifacts/ 2>/dev/null || true

      - name: Collect Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        run: |
          mkdir -p ./artifacts
          cp packages/desktop/src-tauri/target/release/bundle/deb/*.deb ./artifacts/ 2>/dev/null || true
          cp packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage ./artifacts/ 2>/dev/null || true

      - name: Generate Windows icon
        if: matrix.platform == 'windows-latest'
        run: |
          cd packages/desktop/src-tauri/icons
          # Install ImageMagick
          choco install imagemagick -y
          refreshenv
          # Generate icon.ico from PNG
          magick convert icon.png -resize 256x256 icon.ico

      - name: Collect Windows artifacts
        if: matrix.platform == 'windows-latest'
        run: |
          mkdir -p ./artifacts
          copy packages/desktop/src-tauri/target/release/bundle/msi/*.msi ./artifacts/ 2>nul || true
          copy packages/desktop/src-tauri/target/release/bundle/nsis/*.exe ./artifacts/ 2>nul || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: ./artifacts/*

  release-web:
    name: Release Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: cd packages/web && npm run build

      - name: Package web app
        run: |
          cd packages/web/dist
          zip -r ../../../web-dist.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: ./web-dist.zip

  create-release:
    name: Create GitHub Release
    needs: [release-desktop, release-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "## MindFlow v$VERSION" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Desktop Downloads" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "| Platform | Arch | Format |" >> RELEASE_NOTES.md
          echo "|----------|------|--------|" >> RELEASE_NOTES.md
          echo "| macOS | Universal (x64 + arm64) | .dmg |" >> RELEASE_NOTES.md
          echo "| Linux | x64 | .deb, .AppImage |" >> RELEASE_NOTES.md
          echo "| Windows | x64 | .msi, .exe |" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Web Version" >> RELEASE_NOTES.md
          echo "Web version deployed to GitHub Pages" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Changelog" >> RELEASE_NOTES.md
          echo "See [CHANGELOG](../../blob/main/CHANGELOG.md)" >> RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: MindFlow v${{ steps.release_notes.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: ./artifacts/**
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-web:
    name: Deploy to GitHub Pages
    needs: release-web
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist

      - name: Extract web dist
        run: |
          unzip web-dist.zip -d ./dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
