version: '3.8'

services:
  web:
    # 使用预构建的镜像
    image: mindflow-web:latest
    # 或者直接构建（需要先执行 pnpm build）
    # build:
    #   context: .
    #   dockerfile: packages/web/deploy/Dockerfile

    container_name: mindflow-web
    restart: unless-stopped

    ports:
      - "8080:80"

    # 如果需要 HTTPS，取消以下注释并配置证书
    # ports:
    #   - "80:80"
    #   - "443:443"
    # volumes:
    #   - /etc/nginx/ssl:/etc/nginx/ssl:ro

    environment:
      - NODE_ENV=production

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
