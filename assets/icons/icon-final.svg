<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background (最底层) -->
  <rect width="512" height="512" rx="80" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="4"/>

  <!-- Layer 2: Top Icon Section (图标层) -->
  <g transform="translate(156, 100)">
    <!-- Document Icon -->
    <rect x="0" y="0" width="200" height="120" rx="16" fill="#3B82F6"/>
    <path d="M200 0 L200 35 L165 0 Z" fill="#60A5FA" opacity="0.9"/>

    <!-- Content Lines -->
    <rect x="20" y="22" width="160" height="9" rx="4.5" fill="white"/>
    <rect x="20" y="40" width="140" height="9" rx="4.5" fill="white" opacity="0.85"/>
    <rect x="20" y="58" width="150" height="9" rx="4.5" fill="white" opacity="0.85"/>
    <rect x="20" y="76" width="120" height="9" rx="4.5" fill="white" opacity="0.85"/>
    <rect x="20" y="94" width="130" height="9" rx="4.5" fill="white" opacity="0.85"/>

    <!-- Flow Arrow -->
    <g transform="translate(120, 25)">
      <path d="M0 12 Q 25 12 25 24 T 50 36" stroke="#FCD34D" stroke-width="5" fill="none" stroke-linecap="round"/>
      <polygon points="53,36 46,33 46,39" fill="#FCD34D"/>
    </g>
  </g>

  <!-- Layer 3: Text (最顶层 - 文字在图标之上) -->
  <!-- Project Name - CENTERED -->
  <text x="256" y="245" font-family="FiraCode, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" text-anchor="middle" dominant-baseline="middle" fill="#1A1A1A" letter-spacing="3">
    MindFlow
  </text>

  <!-- Subtitle - Below the centered text -->
  <text x="256" y="285" font-family="FiraCode, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="400" text-anchor="middle" fill="#64748B" letter-spacing="1">
    Markdown Editor
  </text>
</svg>
