<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="4"/>

  <!-- Main Icon Container -->
  <g transform="translate(106, 106)">
    <!-- Document Base -->
    <rect x="0" y="40" width="300" height="220" rx="24" fill="#3B82F6"/>

    <!-- Document Corner Fold -->
    <path d="M300 40 L300 100 L240 40 Z" fill="#60A5FA" opacity="0.9"/>

    <!-- Document Content Lines -->
    <rect x="30" y="80" width="240" height="12" rx="6" fill="white" opacity="0.95"/>
    <rect x="30" y="110" width="210" height="12" rx="6" fill="white" opacity="0.85"/>
    <rect x="30" y="140" width="220" height="12" rx="6" fill="white" opacity="0.85"/>
    <rect x="30" y="170" width="180" height="12" rx="6" fill="white" opacity="0.85"/>
    <rect x="30" y="200" width="200" height="12" rx="6" fill="white" opacity="0.85"/>
    <rect x="30" y="230" width="160" height="12" rx="6" fill="white" opacity="0.85"/>

    <!-- Flow Arrow (representing Flow) -->
    <g transform="translate(180, 90)">
      <path d="M0 20 Q 40 20 40 40 T 80 60" stroke="#FCD34D" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
      <polygon points="85,60 75,55 75,65" fill="#FCD34D"/>
    </g>

    <!-- Markdown Symbol (#) stylized -->
    <g transform="translate(220, 60)" opacity="0.3">
      <rect x="0" y="0" width="12" height="60" rx="6" fill="white"/>
      <rect x="20" y="0" width="12" height="60" rx="6" fill="white"/>
      <rect x="40" y="0" width="12" height="60" rx="6" fill="white"/>
    </g>
  </g>

  <!-- Project Name - CENTERED -->
  <text x="256" y="256" font-family="FiraCode, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="700" text-anchor="middle" dominant-baseline="middle" fill="#1A1A1A" letter-spacing="2">
    MindFlow
  </text>
</svg>
