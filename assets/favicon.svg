<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified version for favicon (16x16, 32x32, 48x48) -->
  <rect width="32" height="32" rx="6" fill="#3B82F6"/>

  <!-- Simplified M shape -->
  <path d="M4 24 L4 8 L10 14 L16 8 L16 24"
        stroke="white"
        stroke-width="2.5"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Small document lines -->
  <line x1="18" y1="12" x2="26" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="18" y1="16" x2="24" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="18" y1="20" x2="22" y2="20" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Flow arrow -->
  <line x1="12" y1="18" x2="15" y2="18" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="15.5,18 14.5,17 14.5,19" fill="#FCD34D"/>
</svg>
