name: mindflow_storage
description: MindFlow data persistence layer
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  drift: ^2.14.0
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  mindflow_domain:
    path: ../mindflow_domain
  path: ^1.8.3
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  sqlite3_flutter_libs: ^0.5.18
  sqflite: ^2.4.1
  uuid: ^4.5.1

dev_dependencies:
  drift_dev: ^2.14.0
  build_runner: ^2.4.7
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
