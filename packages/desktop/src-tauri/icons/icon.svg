<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#096dd9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#gradient)"/>

  <!-- Flow/wave lines representing "MindFlow" -->
  <g fill="none" stroke="white" stroke-width="40" stroke-linecap="round">
    <path d="M 280 600 Q 400 400 520 600 T 760 600" opacity="0.9"/>
    <path d="M 280 680 Q 400 480 520 680 T 760 680" opacity="0.7"/>
    <path d="M 280 760 Q 400 560 520 760 T 760 760" opacity="0.5"/>
  </g>

  <!-- Document/page icon hint -->
  <g fill="white" opacity="0.2">
    <rect x="320" y="250" width="384" height="450" rx="20"/>
  </g>

  <!-- "M" monogram -->
  <text x="512" y="420" font-family="Arial, sans-serif" font-size="200" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">M</text>
</svg>
