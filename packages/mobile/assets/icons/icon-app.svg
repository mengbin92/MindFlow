<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>

  <!-- Document Icon -->
  <g transform="translate(106, 106)">
    <rect x="0" y="40" width="300" height="220" rx="24" fill="#FFFFFF"/>
    <path d="M300 40 L300 100 L240 40 Z" fill="#E0E7FF"/>

    <!-- Content Lines -->
    <rect x="30" y="80" width="240" height="14" rx="7" fill="#3B82F6"/>
    <rect x="30" y="110" width="210" height="14" rx="7" fill="#3B82F6" opacity="0.8"/>
    <rect x="30" y="140" width="220" height="14" rx="7" fill="#3B82F6" opacity="0.8"/>
    <rect x="30" y="170" width="180" height="14" rx="7" fill="#3B82F6" opacity="0.8"/>
    <rect x="30" y="200" width="200" height="14" rx="7" fill="#3B82F6" opacity="0.8"/>
    <rect x="30" y="230" width="160" height="14" rx="7" fill="#3B82F6" opacity="0.8"/>

    <!-- Flow Arrow -->
    <g transform="translate(180, 90)">
      <path d="M0 20 Q 40 20 40 40 T 80 60" stroke="#FCD34D" stroke-width="10" fill="none" stroke-linecap="round"/>
      <polygon points="85,60 75,54 75,66" fill="#FCD34D"/>
    </g>

    <!-- Markdown Hash -->
    <g transform="translate(220, 60)" opacity="0.5">
      <rect x="0" y="0" width="12" height="60" rx="6" fill="#3B82F6"/>
      <rect x="20" y="0" width="12" height="60" rx="6" fill="#3B82F6"/>
      <rect x="40" y="0" width="12" height="60" rx="6" fill="#3B82F6"/>
    </g>
  </g>

  <!-- Subtle outer glow -->
  <circle cx="256" cy="256" r="245" fill="none" stroke="#60A5FA" stroke-width="4" opacity="0.3"/>
</svg>
