<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#3B82F6"/>
  <circle cx="256" cy="256" r="240" fill="url(#gradient)" opacity="0.1"/>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Letter M -->
  <g transform="translate(156, 156)">
    <!-- M shape using strokes -->
    <path d="M 40 200 L 40 40 L 90 100 L 140 40 L 140 200"
          stroke="white"
          stroke-width="32"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Add flow element (arrow) -->
    <path d="M 140 140 L 180 140"
          stroke="#FCD34D"
          stroke-width="20"
          fill="none"
          stroke-linecap="round"/>
    <polygon points="190,140 175,130 175,150" fill="#FCD34D"/>
  </g>

  <!-- Project Name -->
  <text x="256" y="360" font-family="FiraCode, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="600" text-anchor="middle" fill="white" letter-spacing="1">
    MindFlow
  </text>
</svg>
