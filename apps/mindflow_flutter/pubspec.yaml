name: mindflow_flutter
description: "MindFlow - A modern Markdown editor for all platforms"
publish_to: 'none'
version: 2.0.0

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.0.0
  go_router: ^17.0.0
  bloc: ^9.0.0
  equatable: ^2.0.5

  # Storage
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path: ^1.8.3

  # Markdown
  flutter_markdown_plus: ^1.0.0
  markdown: ^7.1.1

  # UI Components
  flutter_slidable: ^4.0.0
  flutter_svg: ^2.0.9

  # Utils
  intl: ^0.20.2
  uuid: ^4.2.1
  webview_flutter: ^4.10.0

  # Theme
  dynamic_color: ^1.8.0
  flex_color_scheme: ^8.0.0

  # Local packages
  mindflow_domain:
    path: ../../packages/mindflow_domain
  mindflow_storage:
    path: ../../packages/mindflow_storage
  mindflow_platform:
    path: ../../packages/mindflow_platform
  mindflow_editor_bridge:
    path: ../../packages/mindflow_editor_bridge
  mindflow_render:
    path: ../../packages/mindflow_render
  mindflow_ui:
    path: ../../packages/mindflow_ui
  mindflow_export:
    path: ../../packages/mindflow_export

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
