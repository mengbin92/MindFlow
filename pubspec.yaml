name: mindflow
description: MindFlow - A modern Markdown editor for mobile
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.0.0
  go_router: ^17.0.0
  bloc: ^9.0.0
  equatable: ^2.0.5

  # Storage
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  sqflite: ^2.3.0
  path: ^1.8.3

  # Markdown
  flutter_markdown_plus: ^1.0.0
  markdown: ^7.1.1

  # UI Components
  flutter_slidable: ^4.0.0
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0

  # Editor
  # flutter_quill: ^8.6.0  # 暂时禁用，使用原生 TextField
  # quill_markdown: ^0.1.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.2.1
  archive: ^4.0.0
  file_selector: ^1.0.3
  pdf: ^3.12.0
  printing: ^5.13.4
  share_plus: ^12.0.0
  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0

  # Theme
  dynamic_color: ^1.8.0
  flex_color_scheme: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # fonts:
  #   - family: FiraCode
  #     fonts:
  #       - asset: assets/fonts/FiraCode-Light.ttf
  #         weight: 300
  #       - asset: assets/fonts/FiraCode-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/FiraCode-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/FiraCode-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/FiraCode-Bold.ttf
  #         weight: 700
  #   - family: NotoSansSC
  #     fonts:
  #       - asset: assets/fonts/NotoSansSC-Regular.otf
  #         weight: 400
  #       - asset: assets/fonts/NotoSansSC-Bold.otf
  #         weight: 700

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon-app.svg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/icon-app.svg"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icons/icon-app.svg"
  macos:
    generate: true
    image_path: "assets/icons/icon-app.svg"
